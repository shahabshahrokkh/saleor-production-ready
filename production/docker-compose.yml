services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saleor}
      POSTGRES_DB: saleor
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U saleor" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:8.1-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/app/media
    command: >
      sh -c "python manage.py migrate --noinput && uvicorn saleor.asgi:application --host=0.0.0.0 --port=8000 --workers=2 --lifespan=on --ws=none --no-server-header --no-access-log --timeout-keep-alive=35 --timeout-graceful-shutdown=30 --limit-max-requests=10000"

  worker:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media:/app/media
    command: celery -A saleor.celeryconf:app worker --loglevel=info -c 2

  beat:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A saleor.celeryconf:app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  dashboard:
    # Option 1: Use pre-built image (no source code changes)
    # image: ghcr.io/saleor/saleor-dashboard:3.22

    # Option 2: Build from source (for development & customization)
    build:
      context: ../dashboard-main
      dockerfile: ../production/Dockerfile.dashboard.dev
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      API_URL: ${NEXT_PUBLIC_SALEOR_API_URL:-http://localhost/graphql/}
      APP_MOUNT_URI: /dashboard/
    depends_on:
      - api
    volumes:
      - ../dashboard-main:/app
      - /app/node_modules
      - /app/.next

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - storefront
      - dashboard

  storefront:
    build:
      context: ../storefront-main
      dockerfile: ../production/Dockerfile.storefront.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Client-side (browser) needs localhost through nginx
      NEXT_PUBLIC_SALEOR_API_URL: http://localhost/graphql/
      NEXT_PUBLIC_STOREFRONT_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_CHANNEL: default-channel
      # Server-side (SSR/build) needs Docker service name
      SALEOR_API_URL: http://api:8000/graphql/
      SALEOR_WEBHOOK_SECRET: ${SALEOR_WEBHOOK_SECRET}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    depends_on:
      - api
    volumes:
      - ../storefront-main:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  media:
