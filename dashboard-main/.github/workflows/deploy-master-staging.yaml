name: Deploy Dashboard to main staging
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      CUSTOM_VERSION: ${{ env.CUSTOM_VERSION }}
    env:
      API_URL: /graphql/
      APP_MOUNT_URI: /dashboard/
      STATIC_URL: /dashboard/static/
      SENTRY_ORG: saleor
      SENTRY_PROJECT: dashboard
      SENTRY_URL_PREFIX: "~/dashboard/static"
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      EXTENSIONS_API_URL: "https://apps.staging.saleor.io/api/v1/extensions"
      IS_CLOUD_INSTANCE: true
      ENABLED_SERVICE_NAME_HEADER: true
      ONBOARDING_USER_JOINED_DATE_THRESHOLD: ${{ vars.STAGING_ONBOARDING_USER_JOINED_DATE_THRESHOLD }}
      # master-staging uses core unstable/unreleased schema, so this deployment will have enabled features available only on this branch
      FF_USE_STAGING_SCHEMA: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set custom version
        run: |
          HASH=$(git rev-parse --short HEAD)
          CURRENT_VERSION=$(jq -r .version package.json)
          RELEASE="${CURRENT_VERSION}-${HASH}"
          echo "CUSTOM_VERSION=${RELEASE}" >> $GITHUB_ENV
          echo "SENTRY_RELEASE=${RELEASE}" >> $GITHUB_ENV

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          # Explicitly disables cache to ensure cache is always disabled
          cache: false

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: "package.json"
          # Cache is intentionally disabled for security.
          #
          # GitHub Actions cache doesn't provide any trust boundary:
          # - Any workflow that can run in this repository (e.g., pull_request
          #   or push events) can populate cache entries (using any cache keys)
          # - A trusted workflow (like this build job) can then later restore
          #   that cache and execute or deploy malicious content
          #
          # This enables cache poisoning, meaning someone could inject
          # malicious NPM dependencies or malicious binaries (by replacing
          # the node or npm executable with a malicious one) then leading to
          # code execution during build or compromised deployments (e.g.,
          # implanting backdoors inside the JS or HTML files generated
          # during `pnpm run build`)
          #
          # Since this workflow deploys to AWS, it must not consume artifacts
          # from shared cache.
          package-manager-cache: false
          cache: ""

      - name: Package
        timeout-minutes: 15
        run: |
          pnpm install

      - name: Build
        run: |
          pnpm run build

      - name: Upload Build
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: "build"
          path: "build/"
          if-no-files-found: error
          retention-days: 7

  deploy:
    runs-on: ubuntu-24.04
    needs: [build]

    environment:
      deployment: false
      name: deploy-staging

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: build
          path: build/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_STAGING_ACCOUNT_ID }}:role/${{ secrets.AWS_DASHBOARD_STAGING_CICD_ROLE_NAME }}
          aws-region: us-east-1

      - name: Deploy master staging
        run: |
          aws s3 sync build/dashboard "s3://${DEPLOYMENT_BUCKET}/saleor-master-staging/static/" --delete
          aws s3 cp build/dashboard/index.html "s3://${DEPLOYMENT_BUCKET}/saleor-master-staging/"
        env:
          DEPLOYMENT_BUCKET: ${{ secrets.AWS_CLOUD_STAGING_DEPLOYMENT_BUCKET }}

      - name: Deploy fake production
        run: |
          aws s3 sync build/dashboard "s3://${DEPLOYMENT_BUCKET}/saleor-fake-production/static/" --delete
          aws s3 cp build/dashboard/index.html "s3://${DEPLOYMENT_BUCKET}/saleor-fake-production/"
        env:
          DEPLOYMENT_BUCKET: ${{ secrets.AWS_CLOUD_STAGING_DEPLOYMENT_BUCKET }}

      - name: Invalidate cache
        run: |
          IFS=',' read -ra DISTRIBUTIONS_ARRAY <<< "$CDN_DISTRIBUTIONS"
          for DISTRIBUTION in "${DISTRIBUTIONS_ARRAY[@]}"; do
            echo "::add-mask::$DISTRIBUTION"
            for i in {1..3}; do aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION" --paths "/dashboard*" && break || sleep 5; done
          done
        env:
          CDN_DISTRIBUTIONS: ${{ secrets.AWS_CLOUD_STAGING_CDN_DISTRIBUTIONS }}

  notify-slack:
    needs: [build, deploy]
    if: always()
    permissions: {}
    uses: saleor/saleor-internal-actions/.github/workflows/notify-slack.yaml@eb0c692da7bf13f5e1a82c17488b24c514dd10a1 # v1.10.0
    with:
      type: deployment
      ref: ${{ needs.build.outputs.CUSTOM_VERSION || github.ref_name }}
      status: ${{ needs.deploy.result }}
      product: dashboard
      environment: saleor-master-staging
      mention_on: failure
    secrets:
      mention_group_id: ${{ secrets.SLACK_DASHBOARD_GROUP_ID }}
      slack-webhook-url: ${{ secrets.SLACK_CLOUD_DEPLOYMENTS_WEBHOOK_URL }}
