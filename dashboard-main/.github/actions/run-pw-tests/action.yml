name: Run Playwright tests
description: Run e2e tests using Playwright
inputs:
  BASE_URL:
    description: "Dashboard base url"
    required: true
  API_URL:
    description: "API url"
    required: true
  E2E_USER_NAME:
    description: "Username for e2e tests"
    required: true
  E2E_USER_PASSWORD:
    description: "Password for e2e tests"
    required: true
  E2E_PERMISSIONS_USERS_PASSWORD:
    description: "Permissions user password for e2e tests"
    required: true
  SHARD:
    description: "Shard number"
    required: true
  MAILPITURL:
    description: "mailpit uri"
    required: true
  PW_WORKERS:
    description: "Playwright workers"
    required: true
  PW_RETRIES:
    description: "Playwright retries"
    required: true
  PROJECT:
    description: "Project name from playwright config"
    required: false
    default: "e2e"
  ACCOUNTS:
    description: "Accounts hash"
    required: true
  E2E_ENCODE_PASS:
    description: "Password for encoding credentials"
    required: true
  BRANCH_NAME:
    description: "Branch name"
    required: true
  SALEOR_CLOUD_SERVICE:
    description: "Saleor Cloud service"
    required: true
  DASHBOARD_VERSION:
    description: "Dashboard version"
    required: false
  BUILD_NUMBER:
    description: "GH Actions run ID"
    required: false
  BUILD_URL:
    description: "GH actions url"
    required: false
  APP_IDENTIFIERS:
    description: "Comma-separated app identifiers to test (optional, empty = all)"
    required: false
    default: ""
  ARTIFACT_PREFIX:
    description: "Prefix for artifact names to avoid collisions in matrix builds"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version-file: "package.json"
        cache: "pnpm"

    - name: Install dependencies
      shell: bash
      run: pnpm install

    - name: Get Playwright version
      id: playwright-version
      shell: bash
      run: |
        VERSION=$(pnpm exec playwright --version | awk '{print $NF}')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Cache Playwright browsers
      id: playwright-cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
        restore-keys: |
          playwright-${{ runner.os }}-

    - name: Install Playwright system dependencies (cache hit)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      shell: bash
      run: pnpm exec playwright install-deps chromium

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Restore accounts
      uses: ./.github/actions/restore-accounts
      with:
        BASE_URL: ${{ inputs.BASE_URL }}
        API_URL: ${{ inputs.API_URL }}
        ACCOUNTS: ${{ inputs.ACCOUNTS }}
        E2E_ENCODE_PASS: ${{ inputs.E2E_ENCODE_PASS }}

    - name: Run tests
      shell: bash
      id: run-tests
      env:
        API_URL: ${{ inputs.API_URL }}
        BASE_URL: ${{ inputs.BASE_URL }}
        E2E_USER_NAME: ${{ inputs.E2E_USER_NAME }}
        E2E_USER_PASSWORD: ${{ inputs.E2E_USER_PASSWORD }}
        E2E_PERMISSIONS_USERS_PASSWORD: ${{ inputs.E2E_PERMISSIONS_USERS_PASSWORD }}
        SHARD_NUMBER: ${{ inputs.SHARD }}
        MAILPITURL: ${{ inputs.MAILPITURL }}
        URL_TO_RUN: ${{ inputs.URL_TO_RUN }}
        WORKERS: ${{ inputs.PW_WORKERS }}
        RETRIES: ${{ inputs.PW_RETRIES }}
        PROJECT: ${{ inputs.PROJECT }}
        BRANCH_NAME: ${{ inputs.BRANCH_NAME }}
        SALEOR_CLOUD_SERVICE: ${{ inputs.SALEOR_CLOUD_SERVICE }}
        DASHBOARD_VERSION: ${{ inputs.DASHBOARD_VERSION }}
        BUILD_NUMBER: ${{ inputs.BUILD_NUMBER }}
        BUILD_URL: ${{ inputs.BUILD_URL }}
        APP_IDENTIFIERS: ${{ inputs.APP_IDENTIFIERS }}
        ARTIFACT_PREFIX: ${{ inputs.ARTIFACT_PREFIX }}

      run: |
        PROJECTS=($PROJECT)
        PROJECT_PARAMS=""
        for PROJECT in "${PROJECTS[@]}"; do
          PROJECT_PARAMS+="--project=${PROJECT} "
        done
        PREFIX="${ARTIFACT_PREFIX:+${ARTIFACT_PREFIX}-}"
        echo "reportName=${PREFIX}all-blob-reports-${SHARD_NUMBER%%/*}" >> "$GITHUB_OUTPUT"
        echo "ctrfReport=${PREFIX}ctrf-report-${SHARD_NUMBER%%/*}" >> "$GITHUB_OUTPUT"
        pnpm exec playwright test --grep "#e2e" $PROJECT_PARAMS --shard "$SHARD_NUMBER"

    - name: Upload blob report to GitHub Actions Artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      if: always()
      with:
        name: ${{ steps.run-tests.outputs.reportName }}
        path: blob-report
        retention-days: 1

    - name: Upload ctrf report to GitHub Actions Artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      if: always()
      with:
        name: ${{ steps.run-tests.outputs.ctrfReport }}
        path: ctrf/ctrf-report-*.json
        retention-days: 1
